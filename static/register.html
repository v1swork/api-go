<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <title>Регистрация</title>
    </head>
    <body>
        <div class="container"> 
            <h1>Регистрация</h1>
            <div class="card">
                <input type="text" id="reg-name" placeholder="Имя">
                <input type="number" id="reg-age" placeholder="Возраст">
                <input type="text" id="reg-login" placeholder="Логин">
                <input type="password" id="reg-password" placeholder="Пароль">
                <button onclick="register()">Зарегистрироваться</button>
                <div class="message" id="reg-msg"></div>
                <p class="link">Уже есть аккаунт? <a href="/">Войти</a></p>
            </div>
        </div>
        <script src="js/register.js"></script>
    </body>
</html>
